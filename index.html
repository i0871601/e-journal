<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Вхід до системи</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Вхід до електронного журналу</h1>
  
  <form id="loginForm">
    <input type="text" id="lastName" placeholder="Прізвище" required />
    <input type="password" id="password" placeholder="Пароль" required />
    <button type="submit" id="loginButton">
      <span class="default-text">Увійти</span>
      <span class="dots hidden">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </span>
    </button>
  </form>

  <div id="message"></div>

  <script src="script.js"></script>
</body>
</html>
