<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home</title>
        <link rel="stylesheet" href="./routine-style.css">
        <link rel="stylesheet" href="./journal-style.css">
    </head>

    <body>
        <input type="radio" name="trigger" id="subject" class="input">
        <input type="radio" name="trigger" id="class" class="input">
        <input type="checkbox" id="loading" class="input">
        <input type="checkbox" id="add" class="input">
        <input type="checkbox" id="info" class="input">

        <main id="Journal">
            <input type="checkbox" id="timeTable" class="input">
            <input type="radio" name="trigger" id="reset" class="input" checked>
            <label for="timeTable" id="time-button">
                <div id="time-icon"></div>
            </label>
            <div id="content-timetable">
                <div id="contentTime">
                    <div id="CustomSelectTime">
                        <input type="radio" name="trigger" id="time" class="input">
                        <label for="time" class="select-on">
                            <p id="select-text-day" class="first-option">Виберіть день уроків</p>
                            <span class="select-arrow"></span>
                        </label>
                        <label for="reset" class="select-off">
                            <p class="first-option">закрити</p>
                        </label>
                        <ul id="DaysList"></ul>
                    </div>
                    <div id="wrapper-text-container">
                        <div id="text-container-routine"></div>
                    </div>
                </div>
            </div>
            <nav id="SelectNav"></nav>
            <div id="table"></div>
        </main>

        <script src="./messageBox.js" type="module"></script>
        <script src="./script.js" type="module"></script>
    </body>
</html>
